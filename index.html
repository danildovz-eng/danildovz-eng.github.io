<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация d-bank</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        overflow: hidden; /* Чтобы ни один мудак не мог скроллить страницу */
    }

    /* Форма чисто для вида, всё равно она уже нахрен не нужна */
    .fake-form {
        width: 320px;
        margin: 100px auto;
        padding: 30px;
        background: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        border-radius: 8px;
    }

    .fake-form h2 {
        text-align: center;
        color: #333;
    }

    .fake-form input, .fake-form button {
        width: 100%;
        margin-bottom: 15px;
        padding: 10px;
        box-sizing: border-box;
    }

    /* Тот самый оверлей, который перекрывает весь этот мусор */
    #unclosable-error-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999999; /* Поверх вообще всего */
        user-select: none; /* Чтобы даже текст выделить не смогли */
    }

    .error-modal {
        background: #111;
        padding: 40px;
        border-radius: 8px;
        border: 2px solid #ff3333;
        text-align: center;
        max-width: 450px;
        font-size: 18px;
        color: #ddd;
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        pointer-events: none; /* Блокируем любые клики внутри модалки */
    }

    .error-title {
        color: #ff3333;
        font-weight: bold;
        font-size: 26px;
        margin-bottom: 20px;
        text-transform: uppercase;
    }
</style>
</head>
<body>

<div class="fake-form">
    <h2>Регистрация в d-bank</h2>
    <input type="text" placeholder="Имя пользователя" disabled>
    <input type="password" placeholder="Пароль" disabled>
    <button disabled>Зарегистрироваться</button>
</div>

<div id="unclosable-error-overlay">
    <div class="error-modal">
        <div class="error-title">Ошибка</div>
        <p>Проект закрыт и сервера с этого момента не работают по причине малой популярности, просим прощения.</p>
    </div>
</div>

<script>
    // Блокируем клавиши, чтобы какой-нибудь умник не закрыл через Esc или другие шорткаты
    document.addEventListener('keydown', function(event) {
        event.preventDefault();
    }, { capture: true }); // Перехватываем всё к чертовой матери

    // Блокируем правый клик, чтобы не лезли в код элемента
    document.addEventListener('contextmenu', function(event) {
        event.preventDefault();
    });

    // Предотвращаем попытки скрыть элемент через консоль
    setInterval(() => {
        const overlay = document.getElementById('unclosable-error-overlay');
        if (!overlay || overlay.style.display === 'none' || overlay.style.visibility === 'hidden' || overlay.style.opacity === '0') {
            document.body.innerHTML = '<h1 style="color:red; text-align:center; margin-top:20vh;">Хрен тебе, а не регистрация. Проект мертв.</h1>';
        }
    }, 500);
</script>
</body>
</html>
